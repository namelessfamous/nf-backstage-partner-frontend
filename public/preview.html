<!DOCTYPE html><html><head><meta charset="utf-8"><style>
body{margin:0;font-family:system-ui}
.side{width:256px;height:520px;background:linear-gradient(180deg,#c8f53c,#22222a)}
.hdr{height:64px;display:flex;align-items:center;border-bottom:1px solid rgba(0,0,0,.1);padding:0 24px}
.hdr img{height:32px;width:auto}
.nav{padding:16px 12px}
.item{display:flex;align-items:center;gap:12px;border-radius:12px;padding:10px 12px;color:#000;font-weight:500;font-size:14px}
.item.active{background:rgba(0,0,0,.1)}
.item svg{width:20px;height:20px;color:#7c3aed}
.pill{position:absolute;top:12px;right:12px;display:flex;align-items:center}
.pill img{height:32px;width:32px}
</style></head><body>
<div style="display:flex">
<div class="side">
  <div class="hdr"><img src="/namelessfamous-logo.svg"></div>
  <div class="nav">
    <div class="item active"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>Deliverables</div>
    <div class="item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857"/></svg>Clients</div>
    <div class="item"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/></svg>Projects</div>
  </div>
</div>
<div style="flex:1;height:64px;background:#111114;position:relative;border-bottom:1px solid rgba(255,255,255,.05)">
  <div class="pill"><img src="/nf-icon-composed.svg"></div>
</div>
</div>
</body></html>
