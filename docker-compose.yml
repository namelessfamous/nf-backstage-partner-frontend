# nf-backstage local dev frontends
# All three frontends in one compose group on namfam-net
# Host Caddy handles *.namfam.local TLS routing
#
# Run:  docker compose up -d
# Logs: docker compose logs -f partner
# Stop: docker compose down

services:
  partner:
    container_name: nf-partner
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npx next dev --hostname 0.0.0.0 --port 3000"
    volumes:
      - ./:/app
      - partner_node_modules:/app/node_modules
      - /app/.next
    env_file:
      - .env.local
    environment:
      NEXTAUTH_URL: https://partner.keysai.local
    ports:
      - "3002:3000"
    restart: unless-stopped
    networks:
      - namfam-net

  id:
    container_name: nf-id
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npx next dev --hostname 0.0.0.0 --port 3000"
    volumes:
      - ../nf-id:/app
      - id_node_modules:/app/node_modules
      - /app/.next
    env_file:
      - ../nf-id/.env.local
    environment:
      NEXTAUTH_URL: https://id.namfam.local
    ports:
      - "3004:3000"
    restart: unless-stopped
    networks:
      - namfam-net

  gui:
    container_name: nf-gui
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npx next dev --hostname 0.0.0.0 --port 3000"
    volumes:
      - ../nf-backstage/gui:/app
      - gui_node_modules:/app/node_modules
      - /app/.next
    environment:
      NPM_TOKEN: ${NPM_TOKEN}
      NEXT_PUBLIC_API_URL: https://a.namfam.local
      NEXT_PUBLIC_AUTH_URL: https://id.namfam.local
      NEXTAUTH_URL: https://backstage.namfam.local
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-backstage-local-dev-secret}
    ports:
      - "3003:3000"
    restart: unless-stopped
    networks:
      - namfam-net

volumes:
  partner_node_modules:
  id_node_modules:
  gui_node_modules:

networks:
  namfam-net:
    external: true
